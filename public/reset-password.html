<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Reset Password</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>Reset Password</h1>

        <p>
            Enter your new password below.
        </p>

        <!-- ====================== FORM ====================== -->

        <input
            type="password"
            id="newPassword"
            placeholder="Enter New Password"
        >

        <button
            class="primary-btn"
            onclick="resetPassword()"
        >
            Reset Password
        </button>

        <!-- ====================== OUTPUT ====================== -->

        <div
            class="output"
            id="output"
        ></div>

        <!-- ====================== NAVIGATION ====================== -->

        <div class="btn-container">

            <button
                class="login-btn"
                onclick="goToLogin()"
            >
                Login
            </button>

            <button
                class="signup-btn"
                onclick="goToHome()"
            >
                Home
            </button>

        </div>

    </div>

    <script>

        const BASE_URL =
            "http://localhost:8000";

        // ====================== GET TOKEN ======================

        const params =
            new URLSearchParams(
                window.location.search
            );

        const token =
            params.get("token");

        // ====================== TOKEN CHECK ======================

        if (!token) {

            alert(
                "Invalid reset link"
            );

            window.location.href =
                "forgot-password.html";
        }

        // ====================== RESET PASSWORD ======================

        async function resetPassword() {

            try {

                const newPassword =
                    document.getElementById(
                        "newPassword"
                    ).value;

                if (!newPassword) {

                    alert(
                        "Please enter new password"
                    );

                    return;
                }

                const response =
                    await fetch(

                        `${BASE_URL}/reset-password/${token}`,

                        {

                            method: "POST",

                            headers: {

                                "Content-Type":
                                    "application/json"
                            },

                            body:
                                JSON.stringify({

                                    newPassword
                                })
                        }
                    );

                const result =
                    await response.json();

                // ====================== SHOW RESPONSE ======================

                document.getElementById(
                    "output"
                ).innerText =
                    JSON.stringify(
                        result,
                        null,
                        2
                    );

                // ====================== SUCCESS ======================

                if (response.ok) {

                    alert(
                        "Password Reset Successful"
                    );

                    setTimeout(() => {

                        window.location.href =
                            "login.html";

                    }, 1500);
                }

            } catch (error) {

                document.getElementById(
                    "output"
                ).innerText =
                    error.message;
            }
        }

        // ====================== NAVIGATION ======================

        function goToLogin() {

            window.location.href =
                "login.html";
        }

        function goToHome() {

            window.location.href =
                "index.html";
        }

    </script>

</body>

</html>
