<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="style.css">

    <style>

        #otpSection {

            display: none;

            margin-top: 20px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Login</h1>

        <p>
            Login with Email/Phone,
            Password and OTP Verification.
        </p>

        <!-- ====================== LOGIN SECTION ====================== -->

        <div id="loginSection">

            <input
                type="text"
                id="emailOrPhone"
                placeholder="Enter Email or Phone"
            >

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
            >

            <button
                class="primary-btn"
                onclick="login()"
            >
                Send OTP
            </button>

        </div>

        <!-- ====================== OTP SECTION ====================== -->

        <div id="otpSection">

            <input
                type="text"
                id="otp"
                placeholder="Enter OTP"
            >

            <button
                class="primary-btn"
                onclick="verifyOtp()"
            >
                Verify OTP
            </button>

        </div>

        <!-- ====================== OUTPUT ====================== -->

        <div
            class="output"
            id="output"
        ></div>

        <!-- ====================== NAVIGATION ====================== -->

        <div class="btn-container">

            <button
                class="signup-btn"
                onclick="goToSignup()"
            >
                Signup
            </button>

            <button
                class="login-btn"
                onclick="goToHome()"
            >
                Home
            </button>

        </div>

        <!-- ====================== FORGOT PASSWORD ====================== -->

        <div style="margin-top: 20px;">

            <a
                href="forgot-password.html"

                style="
                    color: #60a5fa;
                    text-decoration: none;
                "
            >
                Forgot Password?
            </a>

        </div>

    </div>

    <script>

        const BASE_URL =
            "http://localhost:8000";

        let savedEmail =
            "";

        // ====================== AUTO REDIRECT ======================

        const existingToken =
            localStorage.getItem("token");

        const existingRole =
            localStorage.getItem("role");

        if (
            existingToken &&
            existingRole
        ) {

            redirectByRole(existingRole);
        }

        // ====================== LOGIN ======================

        async function login() {

            try {

                // ====================== INPUTS ======================

                const emailOrPhone =
                    document.getElementById(
                        "emailOrPhone"
                    ).value.trim();

                const password =
                    document.getElementById(
                        "password"
                    ).value.trim();

                // ====================== VALIDATION ======================

                if (

                    !emailOrPhone ||

                    !password

                ) {

                    showOutput(
                        "All fields are required"
                    );

                    return;
                }

                // ====================== REQUEST ======================

                const response =
                    await fetch(

                        `${BASE_URL}/auth/login`,

                        {

                            method: "POST",

                            headers: {

                                "Content-Type":
                                    "application/json"
                            },

                            body:
                                JSON.stringify({

                                    emailOrPhone,
                                    password
                                })
                        }
                    );

                const result =
                    await response.json();

                // ====================== FAILED ======================

                if (!response.ok) {

                    showOutput(

                        result.message ||

                        "Login Failed"
                    );

                    return;
                }

                // ====================== SAVE EMAIL ======================

                savedEmail =
                    result.email;

                // ====================== OTP UI ======================

                document.getElementById(
                    "otpSection"
                ).style.display =
                    "block";

                showOutput(
                    "OTP sent to your email"
                );

            }

            catch (error) {

                showOutput(
                    error.message
                );
            }
        }

        // ====================== VERIFY OTP ======================

        async function verifyOtp() {

            try {

                const otp =
                    document.getElementById(
                        "otp"
                    ).value.trim();

                // ====================== VALIDATION ======================

                if (!otp) {

                    showOutput(
                        "Please enter OTP"
                    );

                    return;
                }

                // ====================== REQUEST ======================

                const response =
                    await fetch(

                        `${BASE_URL}/auth/verify-login-otp`,

                        {

                            method: "POST",

                            headers: {

                                "Content-Type":
                                    "application/json"
                            },

                            body:
                                JSON.stringify({

                                    email:
                                        savedEmail,

                                    otp
                                })
                        }
                    );

                const result =
                    await response.json();

                // ====================== FAILED ======================

                if (!response.ok) {

                    showOutput(

                        result.message ||

                        "OTP Verification Failed"
                    );

                    return;
                }

                // ====================== SAVE TOKEN ======================

                localStorage.setItem(

                    "token",

                    result.token
                );

                // ====================== SAVE ROLE ======================

                localStorage.setItem(

                    "role",

                    result.role
                );

                // ====================== SUCCESS ======================

                showOutput(
                    "Login Successful ✅"
                );

                // ====================== REDIRECT ======================

                setTimeout(() => {

                    redirectByRole(
                        result.role
                    );

                }, 1000);

            }

            catch (error) {

                showOutput(
                    error.message
                );
            }
        }

        // ====================== ROLE REDIRECT ======================

        function redirectByRole(role) {

            if (role === "admin") {

                window.location.href =
                    "admin-dashboard.html";
            }

            else if (
                role === "manager"
            ) {

                window.location.href =
                    "manager-dashboard.html";
            }

            else {

                window.location.href =
                    "profile.html";
            }
        }

        // ====================== OUTPUT ======================

        function showOutput(message) {

            document.getElementById(
                "output"
            ).innerText =
                message;
        }

        // ====================== NAVIGATION ======================

        function goToSignup() {

            window.location.href =
                "signup.html";
        }

        function goToHome() {

            window.location.href =
                "index.html";
        }

    </script>

</body>

</html>
