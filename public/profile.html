<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Profile</title>

    <link rel="stylesheet" href="style.css">

    <style>

        .profile-card {

            margin-top: 25px;

            background: #111827;

            border-radius: 16px;

            padding: 30px;

            text-align: left;

            box-shadow: 0px 4px 12px rgba(0,0,0,0.3);
        }

        .profile-header {

            display: flex;

            align-items: center;

            gap: 20px;

            margin-bottom: 30px;
        }

        .profile-avatar {

            width: 80px;

            height: 80px;

            border-radius: 50%;

            background: #2563eb;

            display: flex;

            justify-content: center;

            align-items: center;

            font-size: 32px;

            font-weight: bold;
        }

        .profile-info h2 {

            margin-bottom: 5px;
        }

        .profile-info p {

            color: #9ca3af;

            margin: 0;
        }

        .profile-details {

            display: grid;

            grid-template-columns: 1fr 1fr;

            gap: 20px;
        }

        .detail-box {

            background: #1f2937;

            padding: 15px;

            border-radius: 12px;
        }

        .detail-title {

            font-size: 13px;

            color: #9ca3af;

            margin-bottom: 8px;
        }

        .detail-value {

            font-size: 17px;

            font-weight: bold;
        }

        .action-buttons {

            margin-top: 30px;

            display: flex;

            gap: 15px;
        }

        @media(max-width: 768px) {

            .profile-details {

                grid-template-columns: 1fr;
            }

            .profile-header {

                flex-direction: column;

                text-align: center;
            }

            .action-buttons {

                flex-direction: column;
            }
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>User Profile</h1>

        <p>
            Protected profile page with authenticated access.
        </p>

        <!-- ====================== PROFILE CARD ====================== -->

        <div
            class="profile-card"
            id="profileCard"
            style="display:none;"
        >

            <!-- HEADER -->

            <div class="profile-header">

                <div
                    class="profile-avatar"
                    id="avatar"
                >
                    U
                </div>

                <div class="profile-info">

                    <h2 id="userName">
                        Loading...
                    </h2>

                    <p id="userEmail">
                        Loading...
                    </p>

                </div>

            </div>

            <!-- DETAILS -->

            <div class="profile-details">

                <div class="detail-box">

                    <div class="detail-title">
                        Phone
                    </div>

                    <div
                        class="detail-value"
                        id="userPhone"
                    >
                        -
                    </div>

                </div>

                <div class="detail-box">

                    <div class="detail-title">
                        Address
                    </div>

                    <div
                        class="detail-value"
                        id="userAddress"
                    >
                        -
                    </div>

                </div>

                <div class="detail-box">

                    <div class="detail-title">
                        State
                    </div>

                    <div
                        class="detail-value"
                        id="userState"
                    >
                        -
                    </div>

                </div>

                <div class="detail-box">

                    <div class="detail-title">
                        City
                    </div>

                    <div
                        class="detail-value"
                        id="userCity"
                    >
                        -
                    </div>

                </div>

                <div class="detail-box">

                    <div class="detail-title">
                        Email Verified
                    </div>

                    <div
                        class="detail-value"
                        id="userVerified"
                    >
                        -
                    </div>

                </div>

                <div class="detail-box">

                    <div class="detail-title">
                        Verified At
                    </div>

                    <div
                        class="detail-value"
                        id="verifiedAt"
                    >
                        -
                    </div>

                </div>

            </div>

            <!-- ACTION BUTTONS -->

            <div class="action-buttons">

                <button
                    class="primary-btn"
                    onclick="updateProfilePage()"
                >
                    Update Profile
                </button>

                <button
                    class="logout-btn"
                    onclick="logout()"
                >
                    Logout
                </button>

            </div>

        </div>

    </div>

    <script>

        const BASE_URL = "http://localhost:8000";

        // ====================== TOKEN CHECK ======================

        const token = localStorage.getItem("token");

        if (!token) {

            alert("Please login first");

            window.location.href = "login.html";
        }

        // ====================== GET PROFILE ======================

        async function getProfile() {

            try {

                const response = await fetch(
                    `${BASE_URL}/profile`,
                    {
                        method: "GET",

                        headers: {
                            "Content-Type": "application/json",

                            "Authorization":
                                `Bearer ${token}`
                        }
                    }
                );

                // Unauthorized

                if (response.status === 401) {

                    localStorage.removeItem("token");

                    alert("Session expired");

                    window.location.href =
                        "login.html";

                    return;
                }

                const result = await response.json();

                const user = result.user;

                // ====================== SHOW CARD ======================

                document.getElementById("profileCard")
                    .style.display = "block";

                // ====================== AVATAR ======================

                document.getElementById("avatar")
                    .innerText =
                    user.name.charAt(0).toUpperCase();

                // ====================== USER INFO ======================

                document.getElementById("userName")
                    .innerText =
                    user.name || "-";

                document.getElementById("userEmail")
                    .innerText =
                    user.email || "-";

                document.getElementById("userPhone")
                    .innerText =
                    user.phone || "-";

                document.getElementById("userAddress")
                    .innerText =
                    user.address || "-";

                document.getElementById("userState")
                    .innerText =
                    user.state || "-";

                document.getElementById("userCity")
                    .innerText =
                    user.city || "-";

                document.getElementById("userVerified")
                    .innerText =
                    user.isVerified ? "Yes ✅" : "No ❌";

                document.getElementById("verifiedAt")
                    .innerText =
                    user.verifiedAt
                    ? new Date(user.verifiedAt)
                        .toLocaleString()
                    : "-";

            } catch (error) {

                alert(error.message);
            }
        }

        // ====================== LOGOUT ======================

        function logout() {

            localStorage.removeItem("token");

            localStorage.removeItem("userName");

            alert("Logged out successfully");

            window.location.href = "login.html";
        }

        // ====================== NAVIGATION ======================

        function updateProfilePage() {

            window.location.href =
                "update-profile.html";
        }

        // ====================== LOAD PROFILE ======================

        getProfile();

    </script>

</body>

</html>
