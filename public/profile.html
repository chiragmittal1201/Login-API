<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Profile</title>

    <link rel="stylesheet" href="style.css">

    <style>

        .profile-card {

            margin-top: 25px;

            background: #111827;

            border-radius: 16px;

            padding: 30px;

            text-align: left;

            box-shadow: 0px 4px 12px rgba(0,0,0,0.3);
        }

        .profile-header {

            display: flex;

            align-items: center;

            gap: 20px;

            margin-bottom: 30px;
        }

        .profile-avatar {

            width: 80px;

            height: 80px;

            border-radius: 50%;

            background: #2563eb;

            display: flex;

            justify-content: center;

            align-items: center;

            font-size: 32px;

            font-weight: bold;
        }

        .profile-info h2 {

            margin-bottom: 5px;
        }

        .profile-info p {

            color: #9ca3af;

            margin: 0;
        }

        .profile-details {

            display: grid;

            grid-template-columns: 1fr 1fr;

            gap: 20px;
        }

        .detail-box {

            background: #1f2937;

            padding: 15px;

            border-radius: 12px;
        }

        .detail-title {

            font-size: 13px;

            color: #9ca3af;

            margin-bottom: 8px;
        }

        .detail-value {

            font-size: 17px;

            font-weight: bold;
        }

        .action-buttons {

            margin-top: 30px;

            display: flex;

            gap: 15px;

            flex-wrap: wrap;
        }

        .manager-btn {

            background: #8b5cf6;

            color: white;
        }

        .dashboard-btn {

            background: #f59e0b;

            color: white;
        }

        @media(max-width: 768px) {

            .profile-details {

                grid-template-columns: 1fr;
            }

            .profile-header {

                flex-direction: column;

                text-align: center;
            }

            .action-buttons {

                flex-direction: column;
            }
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>User Profile</h1>

        <p>
            Protected profile page with RBAC support.
        </p>

        <!-- ====================== PROFILE CARD ====================== -->

        <div
            class="profile-card"
            id="profileCard"
            style="display:none;"
        >

            <!-- HEADER -->

            <div class="profile-header">

                <div
                    class="profile-avatar"
                    id="avatar"
                >
                    U
                </div>

                <div class="profile-info">

                    <h2 id="userName">
                        Loading...
                    </h2>

                    <p id="userEmail">
                        Loading...
                    </p>

                </div>

            </div>

            <!-- DETAILS -->

            <div class="profile-details">

                <div class="detail-box">

                    <div class="detail-title">
                        Phone
                    </div>

                    <div
                        class="detail-value"
                        id="userPhone"
                    >
                        -
                    </div>

                </div>

                <div class="detail-box">

                    <div class="detail-title">
                        Address
                    </div>

                    <div
                        class="detail-value"
                        id="userAddress"
                    >
                        -
                    </div>

                </div>

                <div class="detail-box">

                    <div class="detail-title">
                        State
                    </div>

                    <div
                        class="detail-value"
                        id="userState"
                    >
                        -
                    </div>

                </div>

                <div class="detail-box">

                    <div class="detail-title">
                        City
                    </div>

                    <div
                        class="detail-value"
                        id="userCity"
                    >
                        -
                    </div>

                </div>

                <div class="detail-box">

                    <div class="detail-title">
                        Email Verified
                    </div>

                    <div
                        class="detail-value"
                        id="userVerified"
                    >
                        -
                    </div>

                </div>

                <div class="detail-box">

                    <div class="detail-title">
                        Verified At
                    </div>

                    <div
                        class="detail-value"
                        id="verifiedAt"
                    >
                        -
                    </div>

                </div>

                <!-- ROLE -->

                <div class="detail-box">

                    <div class="detail-title">
                        Role
                    </div>

                    <div
                        class="detail-value"
                        id="userRole"
                    >
                        -
                    </div>

                </div>

                <!-- REQUEST STATUS -->

                <div class="detail-box">

                    <div class="detail-title">
                        Manager Request Status
                    </div>

                    <div
                        class="detail-value"
                        id="requestStatus"
                    >
                        -
                    </div>

                </div>

            </div>

            <!-- ACTION BUTTONS -->

            <div class="action-buttons">

                <button
                    class="primary-btn"
                    onclick="updateProfilePage()"
                >
                    Update Profile
                </button>

                <!-- REQUEST BUTTON -->

                <button
                    class="manager-btn"
                    id="requestManagerBtn"
                    onclick="requestManagerAccess()"
                    style="display:none;"
                >
                    Request Manager Access
                </button>

                <!-- REQUEST STATUS -->

                <button
                    class="dashboard-btn"
                    onclick="goRequestStatus()"
                >
                    Request Status
                </button>

                <!-- ADMIN DASHBOARD -->

                <button
                    class="dashboard-btn"
                    id="adminDashboardBtn"
                    onclick="goAdminDashboard()"
                    style="display:none;"
                >
                    Admin Dashboard
                </button>

                <!-- MANAGER DASHBOARD -->

                <button
                    class="dashboard-btn"
                    id="managerDashboardBtn"
                    onclick="goManagerDashboard()"
                    style="display:none;"
                >
                    Manager Dashboard
                </button>

                <button
                    class="logout-btn"
                    onclick="logout()"
                >
                    Logout
                </button>

            </div>

        </div>

    </div>

    <script>

        const BASE_URL =
            "http://localhost:8000";

        // ====================== TOKEN ======================

        const token =
            localStorage.getItem("token");

        if (!token) {

            alert("Please login first");

            window.location.href =
                "login.html";
        }

        // ====================== GET PROFILE ======================

        async function getProfile() {

            try {

                const response =
                    await fetch(

                        `${BASE_URL}/profile`,

                        {

                            method: "GET",

                            headers: {

                                "Content-Type":
                                    "application/json",

                                "Authorization":
                                    `Bearer ${token}`
                            }
                        }
                    );

                if (response.status === 401) {

                    logout();

                    return;
                }

                const result =
                    await response.json();

                const user =
                    result.user;

                // ====================== SHOW CARD ======================

                document.getElementById(
                    "profileCard"
                ).style.display = "block";

                // ====================== AVATAR ======================

                document.getElementById(
                    "avatar"
                ).innerText =
                    user.name.charAt(0)
                        .toUpperCase();

                // ====================== USER INFO ======================

                document.getElementById(
                    "userName"
                ).innerText =
                    user.name || "-";

                document.getElementById(
                    "userEmail"
                ).innerText =
                    user.email || "-";

                document.getElementById(
                    "userPhone"
                ).innerText =
                    user.phone || "-";

                document.getElementById(
                    "userAddress"
                ).innerText =
                    user.address || "-";

                document.getElementById(
                    "userState"
                ).innerText =
                    user.state || "-";

                document.getElementById(
                    "userCity"
                ).innerText =
                    user.city || "-";

                document.getElementById(
                    "userVerified"
                ).innerText =
                    user.isVerified
                    ? "Yes ✅"
                    : "No ❌";

                document.getElementById(
                    "verifiedAt"
                ).innerText =
                    user.verifiedAt
                    ? new Date(
                        user.verifiedAt
                    ).toLocaleString()
                    : "-";

                // ====================== ROLE ======================

                document.getElementById(
                    "userRole"
                ).innerText =
                    user.role || "user";

                // ====================== REQUEST STATUS ======================

                document.getElementById(
                    "requestStatus"
                ).innerText =
                    user.managerRequestStatus
                    || "none";

                // ====================== SAVE ROLE ======================

                localStorage.setItem(
                    "role",
                    user.role
                );

                // ====================== USER BUTTON ======================

                if (
                    user.role === "user"
                ) {

                    document.getElementById(
                        "requestManagerBtn"
                    ).style.display =
                        "block";
                }

                // ====================== ADMIN BUTTON ======================

                if (
                    user.role === "admin"
                ) {

                    document.getElementById(
                        "adminDashboardBtn"
                    ).style.display =
                        "block";
                }

                // ====================== MANAGER BUTTON ======================

                if (
                    user.role === "manager"
                ) {

                    document.getElementById(
                        "managerDashboardBtn"
                    ).style.display =
                        "block";
                }

            } catch (error) {

                alert(error.message);
            }
        }

        // ====================== REQUEST MANAGER ACCESS ======================

        async function requestManagerAccess() {

            try {

                const response =
                    await fetch(

                        `${BASE_URL}/request/request-manager-role`,

                        {

                            method: "POST",

                            headers: {

                                "Content-Type":
                                    "application/json",

                                "Authorization":
                                    `Bearer ${token}`
                            }
                        }
                    );

                const result =
                    await response.json();

                alert(result.message);

                window.location.reload();

            } catch (error) {

                alert(error.message);
            }
        }

        // ====================== UPDATE PROFILE ======================

        function updateProfilePage() {

            window.location.href =
                "update-profile.html";
        }

        // ====================== REQUEST STATUS ======================

        function goRequestStatus() {

            window.location.href =
                "manager-request-status.html";
        }

        // ====================== ADMIN DASHBOARD ======================

        function goAdminDashboard() {

            window.location.href =
                "admin-dashboard.html";
        }

        // ====================== MANAGER DASHBOARD ======================

        function goManagerDashboard() {

            window.location.href =
                "manager-dashboard.html";
        }

        // ====================== LOGOUT ======================

        function logout() {

            localStorage.removeItem("token");

            localStorage.removeItem("userName");

            localStorage.removeItem("role");

            alert("Logged out successfully");

            window.location.href =
                "login.html";
        }

        // ====================== LOAD PROFILE ======================

        getProfile();

    </script>

</body>

</html>
