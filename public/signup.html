<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Signup</title>

    <link rel="stylesheet" href="style.css">

    <style>

        #googleSignInDiv {

            margin-top: 20px;

            display: flex;

            justify-content: center;
        }

    </style>

    <!-- ====================== GOOGLE SCRIPT ====================== -->

    <script
        src="https://accounts.google.com/gsi/client"
        async
        defer
    ></script>

</head>

<body>

    <div class="container">

        <h1>Create Account</h1>

        <p>
            Signup to access protected routes
            and authentication features.
        </p>

        <!-- ====================== FORM ====================== -->

        <input
            type="text"
            id="name"
            placeholder="Enter Name"
        >

        <input
            type="email"
            id="email"
            placeholder="Enter Email"
        >

        <input
            type="text"
            id="phone"
            placeholder="Enter Phone"
        >

        <input
            type="text"
            id="address"
            placeholder="Enter Address"
        >

        <input
            type="text"
            id="state"
            placeholder="Enter State"
        >

        <input
            type="text"
            id="city"
            placeholder="Enter City"
        >

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
        >

        <button
            class="primary-btn"
            onclick="signup()"
        >
            Signup
        </button>

        <!-- ====================== GOOGLE SIGNUP ====================== -->

        <div id="googleSignInDiv"></div>

        <!-- ====================== OUTPUT ====================== -->

        <div class="output" id="output"></div>

        <!-- ====================== NAVIGATION ====================== -->

        <div class="btn-container">

            <button
                class="login-btn"
                onclick="goToLogin()"
            >
                Login
            </button>

            <button
                class="signup-btn"
                onclick="goToHome()"
            >
                Home
            </button>

        </div>

    </div>

    <script>

        const BASE_URL =
            "http://localhost:8000";

        // ====================== GOOGLE CLIENT ID ======================

        const GOOGLE_CLIENT_ID =
            "1093389043498-lgd56cb5vdi1qcmogmlhdvg8blq9oaqd.apps.googleusercontent.com";

        // ====================== GOOGLE INIT ======================

        window.onload = () => {

            google.accounts.id.initialize({

                client_id:
                    GOOGLE_CLIENT_ID,

                callback:
                    handleGoogleSignup
            });

            google.accounts.id.renderButton(

                document.getElementById(
                    "googleSignInDiv"
                ),

                {

                    theme:
                        "outline",

                    size:
                        "large",

                    width:
                        250
                }
            );
        };

        // ====================== GOOGLE SIGNUP ======================

        async function handleGoogleSignup(response) {

            try {

                const googleToken =
                    response.credential;

                const backendResponse =
                    await fetch(

                        `${BASE_URL}/auth/google-login`,

                        {

                            method: "POST",

                            headers: {

                                "Content-Type":
                                    "application/json"
                            },

                            body:
                                JSON.stringify({

                                    token:
                                        googleToken
                                })
                        }
                    );

                const result =
                    await backendResponse.json();

                // ====================== FAILED ======================

                if (!backendResponse.ok) {

                    showOutput(

                        result.message ||

                        "Google Signup Failed"
                    );

                    return;
                }

                // ====================== SAVE TOKEN ======================

                localStorage.setItem(

                    "token",

                    result.token
                );

                // ====================== SAVE ROLE ======================

                localStorage.setItem(

                    "role",

                    result.role
                );

                // ====================== SUCCESS ======================

                showOutput(
                    "Google Signup Successful ✅"
                );

                // ====================== REDIRECT ======================

                setTimeout(() => {

                    redirectByRole(
                        result.role
                    );

                }, 1000);

            }

            catch (error) {

                showOutput(
                    error.message
                );
            }
        }

        // ====================== SIGNUP ======================

        async function signup() {

            try {

                const data = {

                    name:
                        document.getElementById("name").value,

                    email:
                        document.getElementById("email").value,

                    phone:
                        document.getElementById("phone").value,

                    address:
                        document.getElementById("address").value,

                    state:
                        document.getElementById("state").value,

                    city:
                        document.getElementById("city").value,

                    password:
                        document.getElementById("password").value
                };

                const response = await fetch(

                    `${BASE_URL}/signup`,

                    {

                        method: "POST",

                        headers: {

                            "Content-Type":
                                "application/json"
                        },

                        body:
                            JSON.stringify(data)
                    }
                );

                const result =
                    await response.json();

                document.getElementById("output")
                    .innerText =
                    JSON.stringify(result, null, 2);

                // ====================== SUCCESS ======================

                if (response.ok) {

                    setTimeout(() => {

                        alert(
                            "Signup successful. Verify your email first."
                        );

                        window.location.href =
                            "login.html";

                    }, 1000);
                }

            }

            catch (error) {

                document.getElementById("output")
                    .innerText =
                    error.message;
            }
        }

        // ====================== ROLE REDIRECT ======================

        function redirectByRole(role) {

            if (role === "admin") {

                window.location.href =
                    "admin-dashboard.html";
            }

            else if (
                role === "manager"
            ) {

                window.location.href =
                    "manager-dashboard.html";
            }

            else {

                window.location.href =
                    "profile.html";
            }
        }

        // ====================== OUTPUT ======================

        function showOutput(message) {

            document.getElementById(
                "output"
            ).innerText =
                message;
        }

        // ====================== NAVIGATION ======================

        function goToLogin() {

            window.location.href =
                "login.html";
        }

        function goToHome() {

            window.location.href =
                "index.html";
        }

    </script>

</body>

</html>
