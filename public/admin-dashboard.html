<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <style>

        .top-bar {

            display: flex;

            gap: 15px;

            flex-wrap: wrap;

            margin-bottom: 25px;
        }

        .top-bar input,
        .top-bar select {

            flex: 1;

            min-width: 180px;

            padding: 12px;

            border: none;

            border-radius: 10px;

            outline: none;

            font-size: 15px;
        }

        .user-card {

            background: #111827;

            padding: 20px;

            border-radius: 15px;

            margin-bottom: 20px;

            border: 1px solid #374151;
        }

        .user-card h3 {

            margin-bottom: 12px;

            color: #60a5fa;
        }

        .user-info {

            margin-bottom: 8px;

            color: #d1d5db;
        }

        .role {

            font-weight: bold;

            color: #facc15;
        }

        .status {

            font-weight: bold;
        }

        .pending {

            color: orange;
        }

        .approved {

            color: #10b981;
        }

        .rejected {

            color: #ef4444;
        }

        .none {

            color: #9ca3af;
        }

        .btn-group {

            display: flex;

            gap: 10px;

            flex-wrap: wrap;

            margin-top: 18px;
        }

        .btn-group button {

            flex: 1;
        }

        .section-title {

            margin-bottom: 20px;

            margin-top: 10px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Admin Dashboard</h1>

        <p>
            Manage users, approve managers,
            filter users and control access.
        </p>

        <!-- ====================== FILTER BAR ====================== -->

        <div class="top-bar">

            <input
                type="text"
                id="searchInput"
                placeholder="Search Name / Email / Phone"
            >

            <select id="roleFilter">

                <option value="">
                    All Roles
                </option>

                <option value="user">
                    User
                </option>

                <option value="manager">
                    Manager
                </option>

                <option value="admin">
                    Admin
                </option>

            </select>

            <select id="statusFilter">

                <option value="">
                    All Status
                </option>

                <option value="pending">
                    Pending
                </option>

                <option value="approved">
                    Approved
                </option>

                <option value="rejected">
                    Rejected
                </option>

                <option value="none">
                    None
                </option>

            </select>

            <button
                class="primary-btn"
                onclick="fetchUsers()"
            >
                Search
            </button>

        </div>

        <!-- ====================== USERS ====================== -->

        <h2 class="section-title">
            Users List
        </h2>

        <div id="usersContainer"></div>

        <!-- ====================== NAVIGATION ====================== -->

        <div class="btn-container">

            <button
                class="login-btn"
                onclick="goHome()"
            >
                Home
            </button>

            <button
                class="signup-btn"
                onclick="logout()"
            >
                Logout
            </button>

        </div>

    </div>

    <script>

        const BASE_URL =
            "http://localhost:8000";

        const token =
            localStorage.getItem("token");

        // ====================== TOKEN CHECK ======================

        if (!token) {

            alert("Please login first");

            window.location.href =
                "login.html";
        }

        // ====================== FETCH USERS ======================

        async function fetchUsers() {

            try {

                const search =
                    document.getElementById(
                        "searchInput"
                    ).value;

                const role =
                    document.getElementById(
                        "roleFilter"
                    ).value;

                const status =
                    document.getElementById(
                        "statusFilter"
                    ).value;

                // ====================== QUERY ======================

                const query =
                    new URLSearchParams({

                        search,
                        role,
                        status

                    }).toString();

                // ====================== API ======================

                const response =
                    await fetch(

                        `${BASE_URL}/admin/all-users?${query}`,

                        {

                            method: "GET",

                            headers: {

                                "Authorization":
                                    `Bearer ${token}`
                            }
                        }
                    );

                const result =
                    await response.json();

                // ====================== AUTH FAIL ======================

                if (
                    response.status === 401
                ) {

                    localStorage.clear();

                    alert("Session expired");

                    window.location.href =
                        "login.html";

                    return;
                }

                // ====================== CONTAINER ======================

                const container =
                    document.getElementById(
                        "usersContainer"
                    );

                container.innerHTML = "";

                // ====================== EMPTY ======================

                if (
                    !result.users ||
                    result.users.length === 0
                ) {

                    container.innerHTML = `
                        <p>No users found</p>
                    `;

                    return;
                }

                // ====================== USERS LOOP ======================

                result.users.forEach(user => {

                    const div =
                        document.createElement("div");

                    div.classList.add(
                        "user-card"
                    );

                    div.innerHTML = `

                        <h3>
                            ${user.name}
                        </h3>

                        <div class="user-info">
                            Email:
                            ${user.email}
                        </div>

                        <div class="user-info">
                            Phone:
                            ${user.phone}
                        </div>

                        <div class="user-info">
                            Role:
                            <span class="role">
                                ${user.role}
                            </span>
                        </div>

                        <div class="user-info">
                            Status:
                            <span class="
                                status
                                ${user.managerRequestStatus}
                            ">
                                ${user.managerRequestStatus}
                            </span>
                        </div>

                        <div class="btn-group">

                            <button
                                class="primary-btn"
                                onclick="approveManager(
                                    '${user._id}'
                                )"
                            >
                                Approve
                            </button>

                            <button
                                class="logout-btn"
                                onclick="rejectManager(
                                    '${user._id}'
                                )"
                            >
                                Reject
                            </button>

                            <button
                                class="signup-btn"
                                onclick="changePassword(
                                    '${user._id}'
                                )"
                            >
                                Change Password
                            </button>

                        </div>
                    `;

                    container.appendChild(div);
                });

            } catch (error) {

                alert(error.message);
            }
        }

        // ====================== APPROVE MANAGER ======================

        async function approveManager(id) {

            try {

                const response =
                    await fetch(

                        `${BASE_URL}/admin/approve-manager/${id}`,

                        {

                            method: "PUT",

                            headers: {

                                "Authorization":
                                    `Bearer ${token}`
                            }
                        }
                    );

                const result =
                    await response.json();

                alert(result.message);

                fetchUsers();

            } catch (error) {

                alert(error.message);
            }
        }

        // ====================== REJECT MANAGER ======================

        async function rejectManager(id) {

            try {

                const response =
                    await fetch(

                        `${BASE_URL}/admin/reject-manager/${id}`,

                        {

                            method: "PUT",

                            headers: {

                                "Authorization":
                                    `Bearer ${token}`
                            }
                        }
                    );

                const result =
                    await response.json();

                alert(result.message);

                fetchUsers();

            } catch (error) {

                alert(error.message);
            }
        }

        // ====================== CHANGE PASSWORD ======================

        async function changePassword(id) {

            try {

                const newPassword =
                    prompt(
                        "Enter New Password"
                    );

                if (!newPassword) {

                    return;
                }

                const response =
                    await fetch(

                        `${BASE_URL}/admin/change-password/${id}`,

                        {

                            method: "PUT",

                            headers: {

                                "Content-Type":
                                    "application/json",

                                "Authorization":
                                    `Bearer ${token}`
                            },

                            body:
                                JSON.stringify({

                                    newPassword
                                })
                        }
                    );

                const result =
                    await response.json();

                alert(result.message);

            } catch (error) {

                alert(error.message);
            }
        }

        // ====================== NAVIGATION ======================

        function goHome() {

            window.location.href =
                "index.html";
        }

        // ====================== LOGOUT ======================

        function logout() {

            localStorage.clear();

            alert("Logged out");

            window.location.href =
                "login.html";
        }

        // ====================== INITIAL LOAD ======================

        fetchUsers();

    </script>

</body>

</html>
